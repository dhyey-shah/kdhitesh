			position: relative;
			width: 70%;
			max-width: 980px;
			min-width: 480px;
			margin: auto;
		}

		.isotope-box {
			position: relative;
			width: 100%;
		}

		.isotope-item {
			position: relative;
			width: 31%;
			margin: 1%;
			box-shadow: 1px 2px 30px rgba(0, 0, 0, 0.9);
		}

		.isotope-item:before {
			content: '';
			display: inline-block;
			padding-top: 60%;
		}

		.item-portrait:before {
			padding-top: 165%;
		}

		.isotope-item img {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: block;
		}

		.lazyload {
			background: #f7f7f7;
		}

		.lazyloading {
			background: #f7f7f7 url(//afarkas.github.io/lazysizes/assets/imgs/loader.gif) no-repeat center;
			min-height: 60px;
		}
	</style>
